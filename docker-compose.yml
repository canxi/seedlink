version: '3.8'

services:
  app:
    image: ghcr.io/canxi/seedlink:latest
    container_name: seedlink
    ports:
      - "5000:5000"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - /downloads:/downloads:ro
      - /media:/media
    env_file:
      - .env.docker
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
