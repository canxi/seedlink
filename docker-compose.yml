version: '3.8'

services:
  app:
    image: canxi/seedlink:latest
    container_name: seedlink
    ports:
      - "5000:5000"
    volumes:
      - ./config:/app/config
      - /downloads:/downloads:ro
      - /downloads:/media
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
