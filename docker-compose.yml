# SeedLink - Docker Compose 配置
# 使用说明：
#   1. 根据你的环境修改 volumes 中的路径
#   2. 端口映射如有冲突可修改前面的数字（如 5001:5000）
#   3. 运行: docker-compose up -d

version: '3.8'

services:
  app:
    image: seedlink/seedlink:latest
    container_name: seedlink
    ports:
      - "5000:5000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - /你的下载目录:/downloads:ro
      - /你的媒体目录:/media
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
